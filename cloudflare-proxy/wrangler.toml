# Wrangler config for Cloudflare Worker deployment
# Install wrangler: npm install -g wrangler
# Deploy:          wrangler deploy
# Local preview:   wrangler dev

name = "psy-docu-proxy"
main = "worker.js"
compatibility_date = "2024-01-01"

